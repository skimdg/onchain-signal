name: Update Onchain Metrics

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST (UTC 22:00) — 1차: 상위 8개 지표 수집
    - cron: '0 10 * * *'   # 19:00 KST (UTC 10:00) — 2차: sthSopr/reserveRisk (일일 잔여 7회)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update-onchain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # BGeometrics(무료) + Foredex.io(FOREDEX_API_KEY 시크릿 있을 때 자동 활성화)
      - name: Fetch onchain metrics
        env:
          FOREDEX_API_KEY: ${{ secrets.FOREDEX_API_KEY }}
        run: node monitor/update-onchain.js

      - name: Commit updated onchain data
        run: |
          git config user.name "Onchain Signal Bot"
          git config user.email "action@github.com"
          git add onchain-data.json
          git diff --staged --quiet || git commit -m "auto: 온체인 지표 업데이트 $(TZ=Asia/Seoul date +'%Y.%m.%d %H:%M') KST"
          git push
