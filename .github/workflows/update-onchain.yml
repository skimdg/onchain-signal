name: Update Onchain Metrics

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST (UTC 22:00) — 1차: 상위 8개 지표 수집
    - cron: '0 10 * * *'   # 19:00 KST (UTC 10:00) — 2차: sthSopr/reserveRisk (일일 잔여 7회)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update-onchain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # BGeometrics API 호출 — 10개 지표, 시간당 8회 한도 고려 2회 분산
      # 1차(07:00): 8개 / 2차(19:00): 2개 → 일일 합계 10회 (15회 한도 내)
      - name: Fetch onchain metrics from BGeometrics
        run: node monitor/update-onchain.js

      - name: Commit updated onchain data
        run: |
          git config user.name "Onchain Signal Bot"
          git config user.email "action@github.com"
          git add onchain-data.json
          git diff --staged --quiet || git commit -m "auto: 온체인 지표 업데이트 $(TZ=Asia/Seoul date +'%Y.%m.%d %H:%M') KST"
          git push
