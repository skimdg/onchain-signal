name: Onchain Signal Alert

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 (GitHub 서버 기준)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run alert check
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node monitor/check-once.js

      # state.json을 repo에 직접 커밋 (Cache 7일 만료 문제 해결)
      - name: Commit state
        run: |
          git config user.name "Onchain Signal Bot"
          git config user.email "action@github.com"
          git add monitor/state.json
          git diff --staged --quiet || (git commit -m "state: 상태 업데이트 $(TZ=Asia/Seoul date +'%Y.%m.%d %H:%M')" && git push)
