name: Update Analyst Positions

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오전 7시 KST (UTC 22:00) — 9시 일일 리포트 전에 완료
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 의존성 없음 — Node.js 내장 fetch만 사용 (API 키 불필요)
      - name: Run analyst web search update
        run: node monitor/update-analysts.js

      - name: Commit updated analyst data
        run: |
          git config user.name "Onchain Signal Bot"
          git config user.email "action@github.com"
          git add analyst-data.json
          git diff --staged --quiet || git commit -m "auto: 애널리스트 웹검색 업데이트 $(TZ=Asia/Seoul date +'%Y.%m.%d')"
          git push
